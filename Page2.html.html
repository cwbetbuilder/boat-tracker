<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>El Toro Instructions - Page 2</title>
    <style>
        :root { --paper: #fdfaf0; --ink: #2c3e50; --accent: #d35400; --grid: #e0dcd0; }
        body { background-color: #d6d2c4; font-family: 'Segoe UI', sans-serif; color: var(--ink); margin: 0; padding: 20px; }
        
        .notebook-page {
            background: var(--paper);
            background-image: linear-gradient(var(--grid) 1px, transparent 1px), 
                              linear-gradient(90deg, var(--grid) 1px, transparent 1px);
            background-size: 25px 25px;
            max-width: 1100px;
            margin: 0 auto;
            padding: 40px;
            border-left: 15px solid #c0392b;
            box-shadow: 10px 10px 25px rgba(0,0,0,0.2);
        }

        .step-section { 
            margin-bottom: 60px; 
            padding: 30px; 
            border: 1px solid #bcbab0; 
            background: rgba(255,255,255,0.8);
            scroll-margin-top: 20px;
        }

        h2 { border-bottom: 2px solid var(--ink); text-transform: uppercase; margin: 0 0 10px 0; font-size: 1.5em; }
        .breadcrumb { font-size: 0.8em; font-weight: bold; color: #7f8c8d; text-transform: uppercase; margin-bottom: 5px; }
        
        /* Drawing Layout */
        .drawing-row { display: flex; gap: 20px; margin: 20px 0; }
        .drawing-box { flex: 1; height: 300px; border: 2px solid var(--ink); background: #fff; display: flex; align-items: center; justify-content: center; }
        .drawing-box iframe { width: 100%; height: 100%; border: none; }

        /* Content Boxes */
        .content-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .data-box { background: #fff; border: 1px solid var(--grid); padding: 20px; box-shadow: 2px 2px 5px rgba(0,0,0,0.05); }
        .full-width { grid-column: span 2; }

        .label { font-weight: bold; text-transform: uppercase; font-size: 0.7em; color: var(--accent); display: block; margin-bottom: 10px; border-bottom: 1px solid var(--grid); }
        ul { margin: 0; padding-left: 20px; }
        li { margin-bottom: 8px; }
    </style>
</head>
<body>

<div class="notebook-page">
    <div id="instruction-manual"></div>
</div>

<script type="application/json" id="project-data">
{

<script>
    const projectData = JSON.parse(document.getElementById('project-data').textContent);

    function renderManual() {
        const container = document.getElementById('instruction-manual');
        let html = "";

        for (const phase in projectData) {
            for (const component in projectData[phase]) {
                for (const step in projectData[phase][component]) {
                    const stepEntries = projectData[phase][component][step];
                    // ID for linking from Page 1
                    const anchorId = encodeURIComponent(step.replace(/\s+/g, '-'));

                    // Extract Instructions and Prerequisites specifically
                    const instList = stepEntries.filter(e => e.Instructions).map(e => e.Instructions);
                    const preList = stepEntries.filter(e => e.Prerequisites).map(e => e.Prerequisites);

                    html += `
                    <section class="step-section" id="${anchorId}">
                        <div class="breadcrumb">${phase} &gt; ${component}</div>
                        <h2>${step}</h2>

                        <div class="drawing-row">
                            <div class="drawing-box"><iframe src="about:blank"></iframe></div>
                            <div class="drawing-box"><iframe src="about:blank"></iframe></div>
                        </div>

                        <div class="content-grid">
                            ${preList.length > 0 ? `
                            <div class="data-box full-width">
                                <span class="label">Prerequisites</span>
                                <ul>${preList.map(p => `<li>${p}</li>`).join('')}</ul>
                            </div>` : ''}

                            <div class="data-box full-width">
                                <span class="label">Instructions</span>
                                <ul>${instList.map(i => `<li>${i}</li>`).join('')}</ul>
                            </div>
                        </div>
                    </section>`;
                }
            }
        }
        container.innerHTML = html;

        // Auto-scroll if hash is present
        if(window.location.hash) {
            const target = document.getElementById(window.location.hash.substring(1));
            if(target) target.scrollIntoView();
        }
    }

    window.onload = renderManual;
</script>
</body>
</html>
